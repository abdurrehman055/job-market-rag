<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dashboard{% endblock %} — JobsRAG PK</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="/static/style.css" rel="stylesheet" />
</head>
<body>
<div class="app-wrapper">

  <!-- ── Sidebar ──────────────────────────────────────────────────── -->
  <nav class="sidebar" id="sidebar">

    <div class="sidebar-brand">
      <div class="brand-icon">
        <i class="bi bi-briefcase-fill"></i>
      </div>
      <div class="brand-text">
        <span class="brand-title">JobsRAG</span>
        <span class="brand-subtitle">PK Intel</span>
      </div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <ul class="nav flex-column gap-1">

        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}"
             href="/dashboard">
            <i class="bi bi-grid-1x2"></i>
            <span>Dashboard</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/upload' %}active{% endif %}"
             href="/upload">
            <i class="bi bi-upload"></i>
            <span>Upload Job</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/search' %}active{% endif %}"
             href="/search">
            <i class="bi bi-search"></i>
            <span>Search &amp; Ask</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/cv-match' %}active{% endif %}"
             href="/cv-match">
            <i class="bi bi-person-check"></i>
            <span>CV Match</span>
          </a>
        </li>

      </ul>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-footer-badge">
        <i class="bi bi-cpu"></i>
        <span>GPT-4o-mini · ada-002</span>
      </div>
    </div>

  </nav>
  <!-- ── End Sidebar ───────────────────────────────────────────────── -->

  <!-- ── Main content ─────────────────────────────────────────────── -->
  <main class="main-content">
    <div class="content-inner">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
